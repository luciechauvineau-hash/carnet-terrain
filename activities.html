<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Carnet Terrain">
<meta name="theme-color" content="#1a3a2a">
<title>Carnet de Terrain</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,500;1,300&family=DM+Sans:wght@400;500&display=swap');

  :root {
    --green-dark: #1a3a2a;
    --green-mid: #2d5a3d;
    --green-light: #4a8c5c;
    --green-pale: #e8f5ec;
    --green-xpale: #f4faf6;
    --blue-mid: #2a4a6b;
    --blue-pale: #e8f0f8;
    --amber-mid: #7a4a10;
    --amber-pale: #fdf0e0;
    --text-primary: #1a2820;
    --text-secondary: #4a6258;
    --text-hint: #8aaa98;
    --border: #d0e4d8;
    --surface: #ffffff;
    --bg: #f4faf6;
    --radius: 14px;
    --radius-sm: 8px;
    --serif: 'Fraunces', Georgia, serif;
    --sans: 'DM Sans', system-ui, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); font-family: var(--sans); color: var(--text-primary); overscroll-behavior: none; }

  /* LAYOUT */
  .app { display: flex; flex-direction: column; height: 100dvh; max-width: 480px; margin: 0 auto; background: var(--surface); box-shadow: 0 0 40px rgba(0,0,0,0.08); }
  .header { background: var(--green-dark); padding: 16px 20px 12px; flex-shrink: 0; }
  .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .header-title { font-family: var(--serif); font-weight: 300; font-size: 20px; color: #e8f5ec; letter-spacing: 0.02em; }
  .header-sejour { font-size: 12px; color: #8aaa98; }
  .progress-bar { display: flex; gap: 4px; }
  .progress-step { flex: 1; height: 3px; border-radius: 2px; background: rgba(255,255,255,0.15); transition: background 0.3s; }
  .progress-step.done { background: #4a8c5c; }
  .progress-step.active { background: rgba(255,255,255,0.7); }

  .content { flex: 1; overflow-y: auto; padding: 0; -webkit-overflow-scrolling: touch; }
  .screen { display: none; padding: 20px; }
  .screen.active { display: block; }

  .bottom-nav { display: flex; background: var(--surface); border-top: 1px solid var(--border); flex-shrink: 0; }
  .bottom-nav button { flex: 1; padding: 10px 4px 12px; font-size: 11px; font-family: var(--sans); border: none; background: none; color: var(--text-hint); cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 3px; transition: color 0.2s; }
  .bottom-nav button.active { color: var(--green-mid); }
  .bottom-nav button svg { width: 20px; height: 20px; }

  /* STYLE DES ÉTAPES BLOQUÉES DANS LA NAV */
  .nav-locked { opacity: 0.3; grayscale: 1; pointer-events: none; }

  /* RESTE DU STYLE (TAGS, BUTTONS, etc.) */
  .temps-badge { display: inline-flex; align-items: center; gap: 8px; padding: 6px 14px 6px 8px; border-radius: 20px; font-size: 12px; font-weight: 500; margin-bottom: 16px; }
  .t1 .temps-badge { background: var(--green-pale); color: var(--green-mid); }
  .t2 .temps-badge { background: var(--blue-pale); color: var(--blue-mid); }
  .t3 .temps-badge { background: var(--amber-pale); color: var(--amber-mid); }
  .temps-num { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 500; }
  .t1 .temps-num { background: var(--green-mid); color: white; }
  .t2 .temps-num { background: var(--blue-mid); color: white; }
  .t3 .temps-num { background: var(--amber-mid); color: white; }
  .temps-title-big { font-family: var(--serif); font-size: 26px; font-weight: 300; line-height: 1.2; margin-bottom: 4px; }
  .temps-sub { font-size: 13px; color: var(--text-secondary); margin-bottom: 24px; }

  .field { margin-bottom: 18px; }
  .field label { font-size: 12px; font-weight: 500; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.06em; display: block; margin-bottom: 6px; }
  select, input[type="text"], textarea {
    width: 100%; font-size: 15px; padding: 11px 14px;
    border: 1px solid var(--border); border-radius: var(--radius-sm);
    background: var(--surface); color: var(--text-primary);
    font-family: var(--sans); appearance: none; -webkit-appearance: none;
    transition: border-color 0.2s;
  }
  textarea { resize: vertical; min-height: 80px; line-height: 1.5; }

  .tags { display: flex; flex-wrap: wrap; gap: 7px; }
  .tag { padding: 7px 13px; border-radius: 20px; font-size: 13px; cursor: pointer; border: 1px solid var(--border); background: var(--bg); color: var(--text-secondary); transition: all 0.15s; user-select: none; }
  .tag.sel-green { background: var(--green-pale); border-color: var(--green-light); color: var(--green-mid); font-weight: 500; }
  .tag.sel-blue { background: var(--blue-pale); border-color: #5a80b0; color: var(--blue-mid); font-weight: 500; }
  .tag.sel-amber { background: var(--amber-pale); border-color: #c07830; color: var(--amber-mid); font-weight: 500; }

  .restitution-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .rest-card { border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 10px; cursor: pointer; text-align: center; font-size: 13px; color: var(--text-secondary); background: var(--bg); transition: all 0.15s; user-select: none; }
  .rest-card.sel { border-color: #c07830; background: var(--amber-pale); color: var(--amber-mid); font-weight: 500; }

  .btn { width: 100%; padding: 14px; border-radius: var(--radius-sm); font-size: 15px; font-weight: 500; font-family: var(--sans); cursor: pointer; border: none; transition: all 0.15s; margin-top: 8px; }
  .btn-green { background: var(--green-mid); color: white; }
  .btn-blue { background: var(--blue-mid); color: white; }
  .btn-amber { background: var(--amber-mid); color: white; }
  .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-primary); }

  .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--green-dark); color: white; padding: 12px 24px; border-radius: 20px; font-size: 14px; opacity: 0; transition: all 0.3s; pointer-events: none; z-index: 100; white-space: nowrap; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .fiche-card { border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 12px; background: var(--surface); }
  .fiche-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .fiche-sejour { font-size: 11px; font-weight: 500; padding: 3px 10px; border-radius: 10px; background: var(--green-pale); color: var(--green-mid); }
  .fiche-date { font-size: 12px; color: var(--text-hint); }
  .fiche-text { font-size: 13px; color: var(--text-secondary); line-height: 1.5; }
</style>
</head>
<body>

<script>
  // VERROU DE SÉCURITÉ : On vérifie si l'utilisateur est identifié
  const sessionSejour = localStorage.getItem('session_sejour');
  if (!sessionSejour) {
      window.location.href = "index.html";
  }
</script>

<div class="app">

  <div class="header">
    <div class="header-top">
      <div>
        <div class="header-title">Carnet de terrain</div>
        <div class="header-sejour">Séjour : <strong id="nomDuSejourAffiche" style="color:white">...</strong></div>
      </div>
    </div>
    <div class="progress-bar" id="progress-bar">
      <div class="progress-step" id="ps1"></div>
      <div class="progress-step" id="ps2"></div>
      <div class="progress-step" id="ps3"></div>
    </div>
  </div>

  <div class="content">

    <div id="screen-observer" class="screen t1 active">
      <span class="temps-badge"><span class="temps-num">1</span> Observer</span>
      <div class="temps-title-big">Ce que je vois<br><em>sur le terrain</em></div>
      <div class="temps-sub">Note tes premières observations du milieu</div>

      <div class="field">
        <label>Milieu observé</label>
        <select id="obs-sejour">
          <option value="">— Choisir le milieu —</option>
          <option>Montagne</option>
          <option>Mer</option>
          <option>Forêt</option>
          <option>Plaine</option>
          <option>Rivière</option>
          <option>Marais</option>
        </select>
      </div>

      <div class="field">
        <label>Lieu précis</label>
        <input type="text" id="obs-lieu" placeholder="ex : sentier du lac...">
      </div>

      <div class="field">
        <label>Ce que j'observe</label>
        <div class="tags" id="obs-tags">
          <span class="tag" onclick="toggleTag(this,'sel-green')">Flore</span>
          <span class="tag" onclick="toggleTag(this,'sel-green')">Faune</span>
          <span class="tag" onclick="toggleTag(this,'sel-green')">Eau</span>
          <span class="tag" onclick="toggleTag(this,'sel-green')">Traces</span>
        </div>
      </div>

      <div class="field">
        <label>Notes libres</label>
        <textarea id="obs-notes" placeholder="Décris tes observations..."></textarea>
      </div>

      <button class="btn btn-green" onclick="validerEtapeSpecifique(1)">Valider l'observation →</button>
    </div>

    <div id="screen-comprendre" class="screen t2">
      <span class="temps-badge"><span class="temps-num">2</span> Comprendre</span>
      <div class="temps-title-big">Ce que j'en<br><em>retiens</em></div>
      
      <div class="field">
        <label>Ce que j'ai ressenti</label>
        <div class="tags">
          <span class="tag" onclick="toggleTag(this,'sel-blue')">Calme</span>
          <span class="tag" onclick="toggleTag(this,'sel-blue')">Curieux</span>
        </div>
      </div>

      <div class="field">
        <label>Note de compréhension</label>
        <textarea id="comp-compris" placeholder="Qu'as-tu appris ?"></textarea>
      </div>

      <button class="btn btn-blue" onclick="validerEtapeSpecifique(2)">Valider la compréhension →</button>
      <button class="btn btn-outline" onclick="goTo('observer')" style="margin-top:8px">← Retour</button>
    </div>

    <div id="screen-agir" class="screen t3">
      <span class="temps-badge"><span class="temps-num">3</span> Agir</span>
      <div class="temps-title-big">Restitution</div>
      
      <div class="field">
        <label>Idée pour ma ville</label>
        <textarea id="agir-ville" placeholder="Une action concrète ?"></textarea>
      </div>

      <button class="btn btn-amber" onclick="saveAll()">Enregistrer la fiche finale</button>
      <button class="btn btn-outline" onclick="goTo('comprendre')" style="margin-top:8px">← Retour</button>
    </div>

    <div id="screen-journal" class="screen">
        <div id="journal-content"></div>
        <button class="btn btn-outline" onclick="exportData()">Exporter le carnet</button>
    </div>

    <div id="screen-infos" class="screen">
        <button class="btn btn-outline" onclick="localStorage.clear(); location.href='index.html';" style="color:red">Déconnexion (Changer de séjour)</button>
    </div>

  </div>

  <nav class="bottom-nav">
    <button class="active" id="nav-obs" onclick="goTo('observer')">Observer</button>
    <button id="nav-comp" class="nav-locked" onclick="goTo('comprendre')">Comprendre</button>
    <button id="nav-agir" class="nav-locked" onclick="goTo('agir')">Agir</button>
    <button onclick="goTo('journal')">Journal</button>
    <button onclick="goTo('infos')">Infos</button>
  </nav>

</div>

<div class="toast" id="toast"></div>

<script>
// --- LOGIQUE DE NAVIGATION ET DE BLOCAGE ---

// On affiche le nom du séjour récupéré à l'accueil
document.getElementById('nomDuSejourAffiche').innerText = sessionSejour;

function goTo(name){
  // On récupère la progression débloquée pour ce séjour
  const progression = parseInt(localStorage.getItem('progression_' + sessionSejour) || "0");

  // Sécurité de navigation
  if (name === 'comprendre' && progression < 1) {
    showToast("🔒 Complétez l'étape 1 d'abord");
    return;
  }
  if (name === 'agir' && progression < 2) {
    showToast("🔒 Complétez l'étape 2 d'abord");
    return;
  }

  // Changement d'écran
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
  
  // Update des boutons de la barre du bas
  document.querySelectorAll('.bottom-nav button').forEach(b => b.classList.remove('active'));
  updateProgress(name);
  rafraichirCadenas();
}

function validerEtapeSpecifique(niveau) {
  localStorage.setItem('progression_' + sessionSejour, niveau);
  showToast("✅ Étape " + niveau + " validée !");
  if(niveau === 1) goTo('comprendre');
  if(niveau === 2) goTo('agir');
}

function rafraichirCadenas() {
  const progression = parseInt(localStorage.getItem('progression_' + sessionSejour) || "0");
  if (progression >= 1) document.getElementById('nav-comp').classList.remove('nav-locked');
  if (progression >= 2) document.getElementById('nav-agir').classList.remove('nav-locked');
}

// --- FONCTIONS EXISTANTES ADAPTÉES ---

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function toggleTag(el, selClass){
  el.classList.toggle(selClass);
}

function updateProgress(name){
  const steps = ['ps1','ps2','ps3'];
  const activeMap = { observer: 0, comprendre: 1, agir: 2 };
  steps.forEach((id, i) => {
    const el = document.getElementById(id);
    el.className = 'progress-step';
    if(i < activeMap[name]) el.classList.add('done');
    if(i === activeMap[name]) el.classList.add('active');
  });
}

function saveAll(){
    showToast("Fiche enregistrée avec succès !");
    localStorage.setItem('progression_' + sessionSejour, 3); // Débloque tout
    goTo('journal');
}

// Lancement initial
rafraichirCadenas();
updateProgress('observer');

</script>
</body>
</html>
